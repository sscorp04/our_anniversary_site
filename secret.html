<section class="section">
  <h1 class="heading">A Secret For You</h1>

  <p>Enter the password to reveal the secret:</p>

  <input id="password" placeholder="Type here...">

  <br><br>

  <button onclick="unlock()">Open</button>

  <p id="secretMessage" style="display:none; margin-top:20px;">
    If you're reading this,  
    it means you’ve discovered the secret page.  

    No matter what the future holds,  
    I will always be grateful that you chose me.
  </p>

</section>

<script>
function unlock() {
  const input = document.getElementById('password').value;
  const secret = document.getElementById('secretMessage');

  if(input.toLowerCase() === 'iloveyou') {
    secret.style.display = 'block';
  } else {
    alert('Incorrect password! Try again.');
    secret.style.display = 'none';
  }
}
</script>
